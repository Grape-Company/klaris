services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deepwoken}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-deepwoken}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-deepwoken} -d ${POSTGRES_DB:-deepwoken}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepwoken

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      ENABLE_DOCS: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deepwoken}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-deepwoken}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-deepwoken}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-deepwoken}
      DATABASE_SSL: "false"
      DATABASE_SSL_VERIFY: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - deepwoken
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RAG_API_URL: http://app:8000
    depends_on:
      app:
        condition: service_started
    networks:
      - deepwoken
    command: ["python", "-m", "bot.main"]

volumes:
  pgdata:

networks:
  deepwoken:
    driver: bridge
